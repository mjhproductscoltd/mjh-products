<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MJH Cart</title>

<link rel="stylesheet" href="../assets/css/theme.css">

<style>
body{
font-family:Arial,sans-serif;
padding:20px;
}

.cart-item{
border:1px solid #ddd;
padding:15px;
margin-bottom:10px;
border-radius:8px;
}

button{
padding:8px 12px;
margin:3px;
cursor:pointer;
}

.qty{
font-weight:bold;
padding:0 10px;
}

.total{
font-size:22px;
font-weight:bold;
margin-top:20px;
}
</style>

</head>
<body>

<h1>🛒 Shopping Cart</h1>

<div id="cartItems"></div>

<div class="total">
Total Items:
<span id="totalItems">0</span>
</div>

<br>

<button onclick="clearCart()">
Clear Cart
</button>

<a href="../order/index.html">
<button>
Checkout
</button>
</a>

<script>

let cart =
JSON.parse(
localStorage.getItem("mjh_cart")
) || [];

function saveCart(){

localStorage.setItem(
"mjh_cart",
JSON.stringify(cart)
);

}

function renderCart(){

const container =
document.getElementById(
"cartItems"
);

container.innerHTML="";

let totalItems=0;

if(cart.length===0){

container.innerHTML=
"<h3>Cart Empty</h3>";

document.getElementById(
"totalItems"
).innerText="0";

return;

}

cart.forEach((item,index)=>{

totalItems +=
(item.qty || 1);

container.innerHTML += `
<div class="cart-item">

<h3>${item.name}</h3>

<p>
Price:
${item.price}
</p>

<button onclick="decreaseQty(${index})">
-
</button>

<span class="qty">
${item.qty || 1}
</span>

<button onclick="increaseQty(${index})">
+
</button>

<button onclick="removeItem(${index})">
Remove
</button>

</div>
`;

});

document.getElementById(
"totalItems"
).innerText=totalItems;

}

function increaseQty(index){

cart[index].qty =
(cart[index].qty || 1)+1;

saveCart();

renderCart();

}

function decreaseQty(index){

if(
(cart[index].qty || 1) > 1
){

cart[index].qty--;

}else{

cart.splice(index,1);

}

saveCart();

renderCart();

}

function removeItem(index){

cart.splice(index,1);

saveCart();

renderCart();

}

function clearCart(){

localStorage.removeItem(
"mjh_cart"
);

cart=[];

renderCart();

}

renderCart();

</script>

</body>
</html>
