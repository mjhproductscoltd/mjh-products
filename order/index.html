<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Online Order - MJH Products</title>
<link rel="stylesheet" href="../assets/css/theme.css">
</head>
<body>

<header class="header">
<h1>MJH Online Order</h1>
</header>

<section class="section">

<h2>Customer Information</h2>

<input id="name" placeholder="Full Name" style="width:100%;padding:10px;margin:5px 0;">

<input id="phone" placeholder="Phone Number" style="width:100%;padding:10px;margin:5px 0;">

<textarea id="address" placeholder="Delivery Address" style="width:100%;padding:10px;height:100px;margin:5px 0;"></textarea>

<h2>Payment Method</h2>

<select id="payment" style="width:100%;padding:10px;margin:5px 0;">
<option>bKash</option>
<option>Nagad</option>
<option>Rocket</option>
<option>Bank Transfer</option>
</select>

<h2>Payment Information</h2>

<p><strong>bKash:</strong> 01XXXXXXXXX</p>
<p><strong>Nagad:</strong> 01XXXXXXXXX</p>
<p><strong>Rocket:</strong> 01XXXXXXXXX</p>
<p><strong>Bank:</strong> MJH Products Company Limited</p>

<button onclick="placeOrder()" class="btn primary">
Place Order via WhatsApp
</button>

</section>

<script>
function placeOrder(){

let cart =
JSON.parse(localStorage.getItem("mjh_cart")) || [];

if(cart.length===0){
alert("Cart is empty");
return;
}

let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let address=document.getElementById("address").value;
let payment=document.getElementById("payment").value;

let items=cart.map(i=>i.name+" - "+i.price).join("\n");

let message=
`🛒 MJH PRODUCTS ORDER

Name: ${name}
Phone: ${phone}
Address: ${address}

Payment: ${payment}

Items:
${items}

Website:
www.mjh-products.com`;

window.open(
"https://wa.me/966550171314?text="+
encodeURIComponent(message),
"_blank"
);

}

</script>

<script src="/assets/js/layout.js"></script>
</body>
</html>
