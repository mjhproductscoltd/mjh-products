<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MJH Checkout</title>

<link rel="stylesheet" href="../assets/css/theme.css">

<style>
body{
font-family:Arial,sans-serif;
padding:20px;
max-width:700px;
margin:auto;
}

input,select{
width:100%;
padding:12px;
margin:8px 0;
box-sizing:border-box;
}

button{
width:100%;
padding:12px;
cursor:pointer;
}

.order-box{
border:1px solid #ddd;
padding:15px;
margin-bottom:20px;
border-radius:8px;
}
</style>

</head>
<body>

<h1>🛒 Checkout</h1>

<div class="order-box">

<h3>Order Summary</h3>

<div id="summary"></div>

<p>
<strong>Total Items:</strong>
<span id="totalItems">0</span>
</p>

</div>

<input
type="text"
id="name"
placeholder="Your Name"
required
>

<input
type="text"
id="phone"
placeholder="Phone Number"
required
>

<input
type="text"
id="address"
placeholder="Delivery Address"
required
>

<select id="payment">

<option>bKash</option>
<option>Nagad</option>
<option>Rocket</option>
<option>Bank Transfer</option>

</select>

<button onclick="placeOrder()">
Place Order
</button>

<script>

let cart =
JSON.parse(
localStorage.getItem("mjh_cart")
) || [];

function renderSummary(){

let html="";
let total=0;

cart.forEach(item=>{

const qty =
item.qty || 1;

total += qty;

html += `
<p>
${item.name}
<br>
Qty: ${qty}
<br>
Price: ${item.price}
</p>
<hr>
`;

});

document.getElementById(
"summary"
).innerHTML = html;

document.getElementById(
"totalItems"
).innerText = total;

}

function placeOrder(){

if(cart.length===0){

alert("Cart is empty");

return;

}

const name =
document.getElementById(
"name"
).value;

const phone =
document.getElementById(
"phone"
).value;

const address =
document.getElementById(
"address"
).value;

const payment =
document.getElementById(
"payment"
).value;

if(
!name ||
!phone ||
!address
){

alert(
"Please fill all fields"
);

return;

}

let items="";

cart.forEach(item=>{

items +=
item.name +
" | Qty: " +
(item.qty || 1) +
" | Price: " +
item.price +
"\n";

});

const message =
`🛒 MJH PRODUCTS ORDER

Name: ${name}

Phone: ${phone}

Address: ${address}

Payment: ${payment}

--------------------

${items}

--------------------

Total Items: ${
cart.reduce(
(a,b)=>
a+(b.qty||1),
0
)
}
`;

window.open(
"https://wa.me/966550171314?text=" +
encodeURIComponent(message),
"_blank"
);

localStorage.removeItem(
"mjh_cart"
);

alert(
"Order Sent Successfully"
);

}

renderSummary();

</script>

</body>
</html>
